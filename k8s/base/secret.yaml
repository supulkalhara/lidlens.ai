# Secret — generated from .env
# Usage: kubectl create secret generic lidlens-secrets --from-env-file=.env -n lidlens
apiVersion: v1
kind: Secret
metadata:
  name: lidlens-secrets
  namespace: lidlens
  labels:
    app.kubernetes.io/part-of: lidlens
type: Opaque
# Required keys: AUTH_SECRET, AUTH_PASSWORD, GROQ_API_KEY
# Optional keys: GMAIL_CLIENT_ID, GMAIL_CLIENT_SECRET, GMAIL_REFRESH_TOKEN, GMAIL_USER
# Populate with:
#   kubectl create secret generic lidlens-secrets --from-env-file=.env -n lidlens
