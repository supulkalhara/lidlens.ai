[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:dashboard]
command=npm start
directory=/app
environment=NODE_ENV="production"
autostart=true
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
priority=1

[program:pipeline]
command=/app/.venv/bin/python pipeline/watcher.py
directory=/app
autostart=true
autorestart=true
startretries=5
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
priority=2
